# Azure DevOps pipeline for the React CI/CD practice app
# Build + Test + Deploy to Azure App Service

trigger:
  - main          # run automatically on every push to main

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'Azure-first-connection'          # <-- your service connection name
  appName: 'cicd-practice-quest-2026'            # <-- your App Service name

stages:
  # ---------- STAGE 1: Build and test ----------
  - stage: BuildAndTest
    displayName: 'Build and Test'
    jobs:
      - job: build
        displayName: 'Install, test, build'
        steps:
          - task: UseNode@1
            displayName: 'Install Node.js'
            inputs:
              version: '20.x'

          - script: npm install
            displayName: 'Install dependencies'

          - script: npm test
            displayName: 'Run tests'

          - script: npm run build
            displayName: 'Build production files'

          # Install ONLY production deps (express) into a clean node_modules
          # so the server has what it needs when deployed.
          - script: npm install --omit=dev
            displayName: 'Install production dependencies'

          # Package server + built files + package.json + node_modules
          - task: CopyFiles@2
            displayName: 'Stage files for deploy'
            inputs:
              Contents: |
                dist/**
                node_modules/**
                server.js
                package.json
                package-lock.json
              TargetFolder: '$(Build.ArtifactStagingDirectory)/app'

          - task: ArchiveFiles@2
            displayName: 'Archive app'
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/app'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/app.zip'
              ArtifactName: 'drop'

  # ---------- STAGE 2: Deploy to Azure ----------
  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: BuildAndTest
    condition: succeeded()        # only deploy if build+test passed
    jobs:
      - job: deploy
        displayName: 'Deploy to App Service'
        steps:
          - task: DownloadBuildArtifacts@1
            displayName: 'Download artifact'
            inputs:
              artifactName: 'drop'
              downloadPath: '$(System.DefaultWorkingDirectory)'

          - task: AzureWebApp@1
            displayName: 'Deploy to Azure Web App'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appName: '$(appName)'
              package: '$(System.DefaultWorkingDirectory)/drop/app.zip'
              startUpCommand: 'npm start'
              appSettings: '-SCM_DO_BUILD_DURING_DEPLOYMENT true'